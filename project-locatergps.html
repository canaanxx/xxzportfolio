<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xuxian.Z — LocaterGPS</title>
  <link rel="stylesheet" href="global.css" />
</head>
<body class="g-page">

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  ✏️  CONTENT CONFIG — project-locatergps.html                 ║
  ║                                                              ║
  ║  复制此文件为新项目时，只改这一块 JSON 即可，              ║
  ║  下方 HTML / CSS / JS 渲染层完全不用动。                    ║
  ╠══════════════════════════════════════════════════════════════╣
  ║                                                              ║
  ║  【SITE】                                                    ║
  ║    backLabel   面包屑返回文字                                ║
  ║    backHref    返回地址                                      ║
  ║                ← 从 index.html 跳来填 "index.html"          ║
  ║                ← 从类别页跳来填对应文件，如 "app-design.html"║
  ║                                                              ║
  ║  【PROJECT】                                                 ║
  ║    title       浏览器标签栏 & 面包屑当前项文字              ║
  ║    heroTitle   左侧超大标题（\n 控制换行）                   ║
  ║    type        项目类型（如 品牌设计 · 网站开发）            ║
  ║    year        时间（年份）                                  ║
  ║    duration    周期（如 8 周）                               ║
  ║    scope       负责内容（如 UI 设计 · 前端开发）             ║
  ║    tools       使用工具（如 Figma · Webflow）                ║
  ║    link        上线链接，留空 "" 则不显示                    ║
  ║                                                              ║
  ║  【OVERVIEW】                                                ║
  ║    heading     一句话概括核心价值                            ║
  ║    paragraphs  正文段落数组（每项 = 一个 <p>）               ║
  ║                                                              ║
  ║  【COVER】封面大图（16:9，全宽展示）                         ║
  ║    image       路径，如 "images/designova-cover.jpg"         ║
  ║    alt         图片描述文字                                  ║
  ║                                                              ║
  ║  【GALLERY】纵向排列图片（可自由增减条目）                   ║
  ║    image       路径，如 "images/designova-01.jpg"            ║
  ║    alt         图片描述                                      ║
  ║    ratio       宽高比，如 "16/9" "3/2" "4/3" "1/1"          ║
  ║    caption     图片下方说明文字                              ║
  ║                                                              ║
  ║  【NEXT】底部跳转区                                          ║
  ║    label       小标签文字，如 "Next Project"                 ║
  ║    name        下一作品名                                    ║
  ║    href        下一作品文件名，如 "project-brandflux.html"   ║
  ║                                                              ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<script id="PAGE_CONFIG" type="application/json">
{
  "SITE": {
    "logo": "Xuxian.Z",
    "nav": [
      { "label": "Home",       "href": "index.html",      "active": false },
      { "label": "App Design", "href": "app-design.html", "active": false },
      { "label": "Web Design", "href": "web-design.html", "active": false },
      { "label": "Others",     "href": "others.html",     "active": false },
      { "label": "About",      "href": "about.html",      "active": false }
    ],
    "contactHref": "#",
    "backLabel":   "All Projects",
    "backHref":    "index.html"
  },

  "PROJECT": {
    "title":     "LocaterGPS",
    "heroTitle": "Locater\nGPS",
    "type":      "品牌设计 · 网站开发",
    "year":      "2024",
    "duration":  "8 周",
    "scope":     "视觉策略 · UI 设计 · 前端开发",
    "tools":     "Figma · Webflow · After Effects",
    "link":      ""
  },

  "OVERVIEW": {
    "heading": "Building a bold identity for a creative-first studio",
    "paragraphs": [
      "Locater GPS approached me with a clear ambition: to reposition themselves from a generalist agency into a premium, design-led studio with a distinct visual language. The existing brand felt dated and generic — it said nothing about their craft or point of view.",
      "The challenge was to build something that felt confident without being loud. A system rooted in Swiss typographic principles, with enough flexibility to stretch across digital, print, and environmental applications. Every decision — from the custom wordmark to the grid-based layout templates — was guided by that balance between restraint and expression.",
      "The result was a complete brand system and new website that communicates Designova's ethos at a glance: rigorous, considered, and distinctly theirs."
    ]
  },

  "COVER": {
    "image": "images/locatergps1.jpg",
    "alt":   "LocaterGPS — Cover Shot"
  },

  "GALLERY": [
    {
      "image":   "images/locatergps2.jpg",
      "alt":     "Brand Identity System",
      "ratio":   "16/9",
      "caption": "Brand Identity System — Logo & Wordmark"
    },
    {
      "image":   "images/designova-02.jpg",
      "alt":     "Typography & Color Palette",
      "ratio":   "3/2",
      "caption": "Typography System & Color Palette"
    },
    {
      "image":   "images/designova-03.jpg",
      "alt":     "Website Homepage",
      "ratio":   "16/10",
      "caption": "Website — Homepage & Navigation"
    },
    {
      "image":   "images/designova-04.jpg",
      "alt":     "Mobile Experience",
      "ratio":   "4/3",
      "caption": "Responsive Design — Mobile Experience"
    }
  ],

  "NEXT": {
    "label": "Next Project",
    "name":  "Brandflux",
    "href":  "project-brandflux.html"
  }
}
</script>

<!-- ================================================================
     ⚙️  渲染层 — 通常无需修改
     ================================================================ -->

<style>
  /* ── 面包屑返回条（Header 正下方 fixed） ── */
  .det-crumb {
    position: fixed;
    top: var(--header-h); left: 0; right: 0;
    z-index: 150;
    display: flex;
    align-items: center;
    height: var(--subnav-h);
    padding: 0 var(--page-px);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--light-gray);
    gap: 0;
  }

  .det-back {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray);
    text-decoration: none;
    letter-spacing: -0.01em;
    transition: color 0.2s ease, gap 0.25s var(--ease-spring);
    white-space: nowrap;
  }
  .det-back:hover              { color: var(--black); gap: 13px; }
  .det-back-arr                { transition: transform 0.22s var(--ease-spring); }
  .det-back:hover .det-back-arr { transform: translateX(-3px); }

  .det-crumb-sep {
    margin: 0 10px;
    color: var(--light-gray);
    font-size: 14px;
    user-select: none;
  }

  .det-crumb-cur {
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 正文偏移：header + 面包屑两层 fixed */
  .det-body { padding-top: var(--subnav-h); }

  /* ── Hero：大标题 ←→ Info Table ── */
  .det-hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: end;
    gap: 48px;
    padding: 64px var(--page-px) 0;
    animation: g-fadeUp 0.8s var(--ease-spring) both;
  }

  .det-title {
    font-size: clamp(52px, 9vw, 118px);
    font-weight: 800;
    letter-spacing: -0.05em;
    line-height: 0.9;
    white-space: pre-line;
  }

  /* Info Table */
  .det-info { padding-bottom: 4px; }

  .det-info-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 11px 0;
    border-bottom: 1px solid var(--light-gray);
  }
  .det-info-row:first-child { border-top: 1px solid var(--light-gray); }

  .det-info-lbl {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
    min-width: 76px;
    flex-shrink: 0;
  }
  .det-info-val {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .det-info-val.is-link {
    text-decoration: none;
    border-bottom: 1px solid var(--light-gray);
    transition: border-color 0.2s ease;
  }
  .det-info-val.is-link:hover { border-color: var(--black); }

  /* ── 分隔线 ── */
  .det-rule {
    border: none;
    border-top: 1px solid var(--light-gray);
    margin: 56px var(--page-px) 0;
  }

  /* ── Overview ── */
  .det-overview {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 60px;
    padding: 60px var(--page-px);
    animation: g-fadeUp 0.8s 0.12s var(--ease-spring) both;
  }

  .det-ov-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
    padding-top: 4px;
  }

  .det-ov-body h2 {
    font-size: clamp(19px, 2.5vw, 29px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.22;
    margin-bottom: 22px;
  }
  .det-ov-body p {
    font-size: 16px;
    line-height: 1.8;
    color: #333;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }
  .det-ov-body p:last-child { margin-bottom: 0; }

  /* ── 封面大图 ── */
  .det-cover {
    padding: 0 var(--page-px);
    animation: g-fadeUp 0.8s 0.18s var(--ease-spring) both;
  }
  .det-cover img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: var(--radius-img);
    background: var(--off-white);
  }

  /* ── Gallery ── */
  .det-gal-section { padding: 72px var(--page-px) 0; }

  .det-gal-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--light-gray);
    margin-bottom: 28px;
  }
  .det-gal-bar-label,
  .det-gal-bar-count {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .det-gal { display: flex; flex-direction: column; gap: 20px; }

  /* 滚动淡入 — JS 添加 .is-vis 触发 */
  .det-gal-item {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.7s var(--ease-spring),
                transform 0.7s var(--ease-spring);
  }
  .det-gal-item.is-vis { opacity: 1; transform: translateY(0); }

  .det-gal-wrap {
    overflow: hidden;
    border-radius: var(--radius-img);
    background: var(--off-white);
    cursor: zoom-in;
  }
  .det-gal-wrap img {
    width: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.65s var(--ease-spring);
  }
  .det-gal-wrap:hover img { transform: scale(1.025); }

  .det-gal-cap {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 11px;
    padding: 0 2px;
  }
  .det-gal-num  { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; color: var(--gray); }
  .det-gal-desc { font-size: 13px; color: var(--gray); letter-spacing: -0.01em; }

  /* ── Next Project ── */
  .det-next {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 72px var(--page-px) 0;
    padding: 44px 0 88px;
    border-top: 1px solid var(--light-gray);
  }

  .det-next-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .det-next-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(24px, 4vw, 52px);
    font-weight: 800;
    letter-spacing: -0.05em;
    color: var(--black);
    text-decoration: none;
    transition: gap 0.25s var(--ease-spring);
  }
  .det-next-link:hover { gap: 22px; }
  .det-next-arr { font-size: 0.62em; transition: transform 0.25s var(--ease-spring); }
  .det-next-link:hover .det-next-arr { transform: translateX(6px); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .det-crumb       { padding: 0 var(--page-px-mob); }
    .det-hero        { grid-template-columns: 1fr; padding: 40px var(--page-px-mob) 0; gap: 28px; }
    .det-rule        { margin: 40px var(--page-px-mob) 0; }
    .det-overview    { grid-template-columns: 1fr; padding: 40px var(--page-px-mob); gap: 14px; }
    .det-cover       { padding: 0 var(--page-px-mob); }
    .det-gal-section { padding: 56px var(--page-px-mob) 0; }
    .det-next        { margin: 56px var(--page-px-mob) 0; flex-direction: column; align-items: flex-start; gap: 14px; padding-bottom: 64px; }
  }
</style>

<!-- ── HEADER ── -->
<header class="g-header" id="g-header">
  <a href="index.html" class="g-logo" id="g-logo"></a>
  <nav class="g-nav"   id="g-nav"></nav>
  <a href="#" class="g-btn-contact" id="g-contact">Contact <span class="arrow">→</span></a>
</header>

<!-- ================================================================
     📌  面包屑（← 返回 / 当前页名）
     ================================================================ -->
<div class="det-crumb">
  <a href="#" class="det-back" id="det-back">
    <span class="det-back-arr">←</span>
    <span id="det-back-txt"></span>
  </a>
  <span class="det-crumb-sep">/</span>
  <span class="det-crumb-cur" id="det-crumb-cur"></span>
</div>

<div class="det-body">

  <!-- ================================================================
       📌  区域 1 — HERO：超大标题 + 右侧项目信息表
       ================================================================ -->
  <div class="det-hero">
    <h1 class="det-title" id="det-title"></h1>
    <div class="det-info"  id="det-info"></div>
  </div>

  <hr class="det-rule" />

  <!-- ================================================================
       📌  区域 2 — OVERVIEW：项目背景介绍
       ================================================================ -->
  <div class="det-overview">
    <span class="det-ov-label">Overview</span>
    <div class="det-ov-body" id="det-ov-body"></div>
  </div>

  <!-- ================================================================
       📌  区域 3 — COVER：封面大图（16:9 全宽）
       ================================================================ -->
  <div class="det-cover">
    <img id="det-cover" src="" alt="" />
  </div>

  <!-- ================================================================
       📌  区域 4 — GALLERY：纵向排列项目图片
       ================================================================ -->
  <section class="det-gal-section">
    <div class="det-gal-bar">
      <span class="det-gal-bar-label">Project Visuals</span>
      <span class="det-gal-bar-count" id="det-gal-count"></span>
    </div>
    <div class="det-gal" id="det-gal"></div>
  </section>

  <!-- ================================================================
       📌  区域 5 — NEXT PROJECT：底部跳转下一个作品
       ================================================================ -->
  <div class="det-next">
    <span class="det-next-label" id="det-next-label"></span>
    <a href="#" class="det-next-link" id="det-next-link">
      <span id="det-next-name"></span>
      <span class="det-next-arr">→</span>
    </a>
  </div>

</div><!-- /.det-body -->

<script src="global-nav.js"></script>
<script>
  const cfg  = JSON.parse(document.getElementById('PAGE_CONFIG').textContent);
  const site = cfg.SITE;
  const proj = cfg.PROJECT;
  const next = cfg.NEXT;

  /* ── 页面 title ── */
  document.title = `Miller.S — ${proj.title}`;

  /* ── 面包屑 ── */
  const backEl = document.getElementById('det-back');
  backEl.href  = site.backHref;
  document.getElementById('det-back-txt').textContent  = site.backLabel;
  document.getElementById('det-crumb-cur').textContent = proj.title;

  /* ── Hero 标题 ── */
  document.getElementById('det-title').textContent = proj.heroTitle;

  /* ── Info Table ── */
  const rows = [
    { label: '项目类型', val: proj.type,     link: false },
    { label: '时间',     val: proj.year,     link: false },
    { label: '周期',     val: proj.duration, link: false },
    { label: '负责内容', val: proj.scope,    link: false },
    { label: '使用工具', val: proj.tools,    link: false },
    ...(proj.link ? [{ label: '项目链接', val: proj.link, link: true }] : [])
  ];

  document.getElementById('det-info').innerHTML = rows.map(r => `
    <div class="det-info-row">
      <span class="det-info-lbl">${r.label}</span>
      ${r.link
        ? `<a class="det-info-val is-link" href="${r.val}" target="_blank" rel="noopener">${r.val} ↗</a>`
        : `<span class="det-info-val">${r.val}</span>`
      }
    </div>`).join('');

  /* ── Overview ── */
  const ov = cfg.OVERVIEW;
  document.getElementById('det-ov-body').innerHTML =
    `<h2>${ov.heading}</h2>` +
    ov.paragraphs.map(p => `<p>${p}</p>`).join('');

  /* ── Cover ── */
  const coverEl = document.getElementById('det-cover');
  coverEl.src = cfg.COVER.image;
  coverEl.alt = cfg.COVER.alt;
  coverEl.onerror = () => coverEl.closest('.det-cover').style.display = 'none';

  /* ── Gallery ── */
  const galItems = cfg.GALLERY;
  document.getElementById('det-gal-count').textContent =
    `${String(galItems.length).padStart(2, '0')} Images`;

  const galEl = document.getElementById('det-gal');
  galItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'det-gal-item';
    div.innerHTML = `
      <div class="det-gal-wrap">
        <img src="${item.image}" alt="${item.alt}" loading="lazy"
             style="aspect-ratio:${item.ratio}"
             onerror="this.closest('.det-gal-wrap').style.minHeight='200px';this.style.display='none'" />
      </div>
      <div class="det-gal-cap">
        <span class="det-gal-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="det-gal-desc">${item.caption}</span>
      </div>`;
    galEl.appendChild(div);
  });

  /* ── Gallery 滚动淡入 ── */
  const galEls = document.querySelectorAll('.det-gal-item');
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const i = Array.from(galEls).indexOf(e.target);
      setTimeout(() => e.target.classList.add('is-vis'), i * 90);
      io.unobserve(e.target);
    });
  }, { threshold: 0.1 });
  galEls.forEach(el => io.observe(el));

  /* ── Next Project ── */
  document.getElementById('det-next-label').textContent = next.label;
  document.getElementById('det-next-name').textContent  = next.name;
  document.getElementById('det-next-link').href         = next.href;

  /* ── Header 滚动边框 ── */
  const hdr = document.getElementById('g-header');
  window.addEventListener('scroll', () =>
    hdr.classList.toggle('is-scrolled', scrollY > 10), { passive: true });
</script>

</body>
</html>
